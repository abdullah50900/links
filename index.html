<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Social Links</title>
    <!-- FontAwesome بۆ ئایکۆنێن کوالیتی بەرز -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* ⚠️ ل ڤێرە دشێی لینکێ وێنێ خوە یێ تایبەت دابنیی */
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1920') no-repeat center center/cover;
            background-attachment: fixed;
            overflow-x: hidden;
            padding: 20px;
        }

        /* ئێفێکتێ لێڵکرنا باکگراوەندی بۆ جوانییا پتر */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            animation: fadeIn 1.2s ease-out;
        }

        /* ئەنیمەیشنا هاتنا کانتێنەری */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* پرۆفایل */
        .profile {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 15px;
        }

        /* ئێفێکتێ LED یێ دزڤریت بۆ دەورێ وێنێ پرۆفایلی */
        .profile::before {
            content: '';
            position: absolute;
            inset: -4px;
            background: conic-gradient(from 0deg, transparent, #00f2fe, #4facfe, transparent 60%);
            border-radius: 50%;
            animation: rotateLED 3s linear infinite;
        }

        .profile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            position: relative;
            z-index: 2;
            border: 3px solid #111;
        }

        .name {
            color: #fff;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .bio {
            color: #ccc;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* لایەنێ بەستەران / لۆپێن LED */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ستایلێ سەرەکی یێ هەر دوگمەکێ دگەل ئێفێکتێ LED یێ دزڤریت */
        .card-link {
            position: relative;
            width: 100%;
            height: 60px;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* دروستکرنا هێڵا LED ا دزڤریت ل پشت پەنجەرێ */
        .card-link::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 300%;
            background: conic-gradient(from 0deg, transparent, var(--led-color), transparent 30%);
            animation: rotateLED 4s linear infinite;
            z-index: 1;
        }
         /* ناڤەڕۆکا شیشەیی یا دکەڤیتە سەر هێڵا LED */
        .card-content {
            position: absolute;
            inset: 2px; /* ئەڤە ستووریا هێڵا LED دیار دکەت */
            background: rgba(15, 15, 25, 0.8);
            border-radius: 13px;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            color: #fff;
            font-weight: 600;
            font-size: 1.05rem;
            transition: background 0.3s;
        }

        .card-content i {
            font-size: 1.4rem;
            transition: transform 0.3s ease;
        }

        /* ئەنیمەیشنا دزڤڕینا LED */
        @keyframes rotateLED {
            100% { transform: rotate(360deg); }
        }

        /* Hover Effects - دەما ماوس دچیتە سەر */
        .card-link:hover {
            transform: scale(1.04);
        }

        .card-link:hover .card-content {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px var(--led-color);
        }

        .card-link:hover .card-content i {
            transform: scale(1.2) rotate(-8deg);
        }

        /* دیارکرنا ڕەنگێن تایبەت یێن LED بۆ هەر سۆشیال میدیایەکێ */
        .instagram { --led-color: #f09433; background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .snapchat { --led-color: #fffc00; }
        .tiktok { --led-color: #00f2fe; }
        .discord { --led-color: #5865F2; }
        .telegram { --led-color: #0088cc; }

    </style>
</head>
<body>

    <div class="container">
        <!-- پرۆفایل -->
        <div class="profile">
            <!-- وێنێ خۆ ل ڤێرە دابنێ -->
            <img src="social.jpg" alt="Profile Picture">
        </div>
        
        <div class="name">Rezdar_bewar</div>
        <div class="bio">خێرهاتی بۆ ئەکاونتێن من یێن فەرمی</div>

        <!-- لایەنێ بەستەران -->
        <div class="links-wrapper">

            <!-- Instagram -->
            <a href="https://www.instagram.com/rezdar.bewar?igsh=N3IyMWp2cW9qYWtt" target="_blank" class="card-link instagram">
                <div class="card-content">
                    <i class="fab fa-instagram"></i>
                    <span>Instagram</span>
                    <i class="fa-solid fa-chevron-left"></i>
                </div>
            </a>

            <!-- Snapchat -->
            <a href="https://www.snapchat.com/add/rezdar.bewar?share_id=oYkKNB5RPGo&locale=ar-EG" target="_blank" class="card-link snapchat">
                <div class="card-content">
                    <i class="fab fa-snapchat"></i>
                    <span>Snapchat</span>
                    <i class="fa-solid fa-chevron-left"></i>
                </div>
            </a>

            <!-- TikTok -->
            <a href="https://www.tiktok.com/@rezdar.fix?_r=1&_t=ZS-96xasiVIak0" target="_blank" class="card-link tiktok">
                <div class="card-content">
                    <i class="fab fa-tiktok"></i>
                    <span>TikTok</span>
                    <i class="fa-solid fa-chevron-left"></i>
                </div>
            </a>

            <!-- Discord -->
            <!-- <a href="https://discord.gg/invite" target="_blank" class="card-link discord">
                <div class="card-content">
                    <i class="fab fa-discord"></i>
                    <span>Discord</span>
                    <i class="fa-solid fa-chevron-left"></i>
                </div>
            </a> -->

            <!-- Telegram -->
            <a href="@rezdarbewar" target="_blank" class="card-link telegram">
                <div class="card-content">
                    <i class="fab fa-telegram"></i>
                    <span>Telegram</span>
                    <i class="fa-solid fa-chevron-left"></i>
                </div>
            </a>

        </div>
    </div>

</body>
</html>
